<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Rangos IPs (CSV/Tabla)</title>
    <style>
        /* Estilos para la tabla */
		#miTabla {
		    width: 100%;
		    border-collapse: collapse;
		    margin-top: 20px;
		}
		
		#miTabla th, #miTabla td {
		    border: 1px solid #dddddd;
		    padding: 8px;
		    text-align: left;
		}
		
		#miTabla th {
		    background-color: #f2f2f2;
		}
		
		/* Estilos para el botón */
		#generarArchivoBtn {
		    margin-top: 10px;
		    padding: 10px;
		    background-color: #4caf50;
		    color: white;
		    border: none;
		    border-radius: 4px;
		    cursor: pointer;
		}
		
		#generarArchivoBtn:hover {
		    background-color: #45a049;
		}
		
		/* Estilos para el botón */
		#generarArchivoTxtBtn {
		    margin-top: 10px;
		    padding: 10px;
		    background-color: #ff7f50;
		    color: white;
		    border: none;
		    border-radius: 4px;
		    cursor: pointer;
		}
		
		#generarArchivoTxtBtn:hover {
		    background-color: #ff6666;
		}
		
    </style>
</head>
<body>
    <label for="selectPais">Selecciona un país:</label>
    <select id="selectPais"></select>
    <button id="generarArchivoBtn">Generar Archivo CSV</button>
    <button id="generarArchivoTxtBtn">Generar Archivo TXT</button>
    <table id="miTabla">
        <thead>
            <tr>
                <th>Campo1</th>
                <th>Campo2</th>
                <th>Campo3</th>
            </tr>
        </thead>
        <tbody></tbody>
    </table>
    <script src="llamada.js"></script>
</body>
</html>
